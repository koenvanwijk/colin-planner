name: Curl checks

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  curl-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start API
        run: |
          uvicorn src.app:app --host 127.0.0.1 --port 8080 &
          echo $! > /tmp/uvicorn.pid

      - name: Wait for health
        run: |
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:8080/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Server did not become healthy in time" >&2
          exit 1

      - name: Curl checks
        run: |
          set -euo pipefail
          curl -sf http://127.0.0.1:8080/health
          curl -sf "http://127.0.0.1:8080/sources/magister/rooster?dateFrom=2026-03-17&dateTill=2026-03-24"
          curl -sf http://127.0.0.1:8080/sources/voetbal/events
          curl -sf -X POST http://127.0.0.1:8080/plan/export/ical \
            -H 'Content-Type: application/json' \
            -d '{"generatedAt":"2026-03-13T00:00:00Z","blocks":[]}'

      - name: Stop API
        if: always()
        run: |
          if [ -f /tmp/uvicorn.pid ]; then
            kill "$(cat /tmp/uvicorn.pid)" || true
          fi
