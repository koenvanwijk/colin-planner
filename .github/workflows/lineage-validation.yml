name: Lineage validation

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  validate-lineage:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate lineage records
        run: python scripts/validate_lineage.py
